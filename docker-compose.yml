services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tecnolicity-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tecnolicity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tecnolicity}
      POSTGRES_DB: ${POSTGRES_DB:-tecnolicity}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tecnolicity} -d ${POSTGRES_DB:-tecnolicity}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    driver: local
