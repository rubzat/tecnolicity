services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tecnolicity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tecnolicity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tecnolicity}
      POSTGRES_DB: ${POSTGRES_DB:-tecnolicity}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-tecnolicity} -d ${POSTGRES_DB:-tecnolicity}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Not published to the host on purpose — only `backend` needs to reach it,
    # over the compose network. Uncomment to inspect the DB from the host.
    # ports:
    #   - '5432:5432'

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: tecnolicity-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-tecnolicity}:${POSTGRES_PASSWORD:-tecnolicity}@postgres:5432/${POSTGRES_DB:-tecnolicity}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      STORAGE_PATH: ./storage
      DOCS_FETCH_ENABLED: ${DOCS_FETCH_ENABLED:-true}
      DOCS_FETCH_CONCURRENCY: ${DOCS_FETCH_CONCURRENCY:-1}
      DOCS_FETCH_DELAY_MS: ${DOCS_FETCH_DELAY_MS:-2000}
      DOCS_FETCH_TIMEOUT_MS: ${DOCS_FETCH_TIMEOUT_MS:-30000}
      DOCS_FETCH_HEADLESS_FALLBACK: ${DOCS_FETCH_HEADLESS_FALLBACK:-true}
      SCRAPER_MAX_PAGES: ${SCRAPER_MAX_PAGES:-50}
      SCRAPER_DELAY_MS: ${SCRAPER_DELAY_MS:-2000}
      SCRAPER_TIMEOUT_MS: ${SCRAPER_TIMEOUT_MS:-45000}
      SCRAPER_PAGE_SIZE: ${SCRAPER_PAGE_SIZE:-100}
      SCRAPE_CRON_ENABLED: ${SCRAPE_CRON_ENABLED:-true}
      SCRAPE_CRON_SCHEDULE: ${SCRAPE_CRON_SCHEDULE:-0 6 * * *}
      VIGENTE_DETAIL_CACHE_TTL_MS: ${VIGENTE_DETAIL_CACHE_TTL_MS:-86400000}
      # Admin auth + public API rate limiting (PR11). ADMIN_PASSWORD and
      # SESSION_SECRET have NO default on purpose — if they're unset here,
      # the container gets an empty string and env.ts's zod validation
      # fails loudly at startup instead of running with a weak secret.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-604800000}
      PUBLIC_RATE_LIMIT_PER_MINUTE: ${PUBLIC_RATE_LIMIT_PER_MINUTE:-30}
      API_KEY_DEFAULT_RATE_LIMIT_PER_MINUTE: ${API_KEY_DEFAULT_RATE_LIMIT_PER_MINUTE:-300}
    volumes:
      - backend_storage:/app/apps/backend/storage
      # Mount source data on the host to run `pnpm ingest` inside the
      # container (see README) — not copied into the image (too large,
      # gitignored).
      - ./data:/app/data:ro
    # Not published to the host on purpose — the frontend's nginx proxies
    # /api to this service over the compose network. Uncomment to call the
    # API directly (debugging, or if the frontend is deployed elsewhere).
    # ports:
    #   - '3000:3000'

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: tecnolicity-frontend
    restart: unless-stopped
    depends_on:
      - backend
    # No host port binding: behind a platform-managed reverse proxy
    # (Dokploy/Coolify/Traefik) the proxy already owns 80/443 on the host —
    # binding here fails with "port is already allocated". The proxy routes
    # to this container over the Docker network using the port it exposes
    # (80, see apps/frontend/Dockerfile). Configure the domain → this
    # service → port 80 in the platform's UI instead.
    #
    # Deploying on a bare VPS with no platform proxy in front? Uncomment:
    # ports:
    #   - '${HTTP_PORT:-80}:80'
    expose:
      - '80'

volumes:
  # Named explicitly (and distinctly from docker-compose.yml's dev volumes)
  # so running dev and prod stacks from the same clone never share a
  # Postgres data dir under the hood.
  postgres_data:
    name: tecnolicity_prod_postgres_data
    driver: local
  backend_storage:
    name: tecnolicity_prod_backend_storage
    driver: local
